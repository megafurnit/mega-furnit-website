<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mega Furnit Visual Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="editor-shell">
    <aside class="editor-sidebar">
      <header class="editor-header">
        <div>
          <p class="eyebrow">Mega Furnit</p>
          <h1>Visual Editor</h1>
        </div>
        <a class="small-link" href="/admin/">Decap CMS</a>
      </header>

      <section class="editor-panel">
        <label for="pageSelector">Page</label>
        <select id="pageSelector">
          <option value="home">Homepage</option>
          <option value="about">About</option>
          <option value="capabilities">Capabilities</option>
          <option value="contact">Contact</option>
          <option value="products">Products</option>
        </select>
      </section>

      <section class="editor-panel">
        <label for="languageSelector">Language</label>
        <select id="languageSelector">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="zh">Chinese</option>
        </select>
      </section>

      <section class="editor-panel ai-panel">
        <h2>AI Assistant</h2>
        <div class="field">
          <label for="aiInstructions">Instructions</label>
          <textarea id="aiInstructions" placeholder="Example: Make this sound more professional for B2B furniture importers."></textarea>
        </div>
        <div class="ai-actions">
          <button class="secondary-button" id="aiImproveButton" type="button">Improve current page copy</button>
          <button class="secondary-button" id="aiTranslateButton" type="button">Translate current language to EN/ES/ZH</button>
          <button class="secondary-button" id="aiProductDescriptionButton" type="button">Generate product description</button>
          <button class="primary-button" id="aiApplyButton" type="button" disabled>Apply AI draft to editor fields</button>
        </div>
        <pre id="aiDraftPreview">No AI draft yet.</pre>
      </section>

      <section class="editor-panel" id="contentEditor"></section>

      <footer class="editor-footer">
        <button class="primary-button" id="saveButton" type="button">Save</button>
        <button class="secondary-button" id="downloadButton" type="button">Download JSON</button>
        <p id="statusMessage">Draft changes preview instantly. Save will try Git Gateway first, then offer safe downloads.</p>
      </footer>
    </aside>

    <main class="preview-area">
      <div class="preview-toolbar">
        <strong id="previewTitle">Homepage preview</strong>
        <div class="preview-actions">
          <button id="desktopPreview" type="button">Desktop</button>
          <button id="mobilePreview" type="button">Mobile</button>
        </div>
      </div>
      <div class="iframe-wrap is-desktop" id="iframeWrap">
        <iframe id="sitePreview" title="Mega Furnit live preview" src="/index.html"></iframe>
      </div>
    </main>
  </div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="editor.js"></script>
</body>
</html>
