backend:
  name: git-gateway
  branch: main

local_backend: true
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "site_content"
    label: "Website Content"
    files:
      - name: "editable_content"
        label: "Editable Page Content"
        file: "data/site-content.json"
        format: "json"
        fields:
          - label: "Schema Metadata"
            name: "_schema"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Schema Version", name: "schemaVersion", widget: "hidden", default: "1.0.0" }
              - { label: "Data Type", name: "dataType", widget: "hidden", default: "site-content" }
              - { label: "Last Updated By", name: "lastUpdatedBy", widget: "hidden", default: "Decap CMS" }
          - label: "English"
            name: "en"
            widget: "object"
            fields:
              - { label: "Homepage Title", name: "heroTitle", widget: "text" }
              - { label: "Homepage Subtitle", name: "heroText", widget: "text" }
              - { label: "Homepage CTA Text", name: "viewProducts", widget: "string" }
              - { label: "About Us Intro", name: "aboutIntro", widget: "text" }
              - { label: "About Us Content", name: "aboutBody", widget: "text" }
              - { label: "Capabilities Intro", name: "capabilitiesIntro", widget: "text" }
              - { label: "Capabilities Content", name: "supplyText", widget: "text" }
              - { label: "Contact Page Content", name: "contactIntro", widget: "text" }
              - { label: "Contact Form Note", name: "formNote", widget: "text" }
          - label: "Spanish"
            name: "es"
            widget: "object"
            fields:
              - { label: "Homepage Title", name: "heroTitle", widget: "text" }
              - { label: "Homepage Subtitle", name: "heroText", widget: "text" }
              - { label: "Homepage CTA Text", name: "viewProducts", widget: "string" }
              - { label: "About Us Intro", name: "aboutIntro", widget: "text" }
              - { label: "About Us Content", name: "aboutBody", widget: "text" }
              - { label: "Capabilities Intro", name: "capabilitiesIntro", widget: "text" }
              - { label: "Capabilities Content", name: "supplyText", widget: "text" }
              - { label: "Contact Page Content", name: "contactIntro", widget: "text" }
              - { label: "Contact Form Note", name: "formNote", widget: "text" }
          - label: "Chinese"
            name: "zh"
            widget: "object"
            fields:
              - { label: "Homepage Title", name: "heroTitle", widget: "text" }
              - { label: "Homepage Subtitle", name: "heroText", widget: "text" }
              - { label: "Homepage CTA Text", name: "viewProducts", widget: "string" }
              - { label: "About Us Intro", name: "aboutIntro", widget: "text" }
              - { label: "About Us Content", name: "aboutBody", widget: "text" }
              - { label: "Capabilities Intro", name: "capabilitiesIntro", widget: "text" }
              - { label: "Capabilities Content", name: "supplyText", widget: "text" }
              - { label: "Contact Page Content", name: "contactIntro", widget: "text" }
              - { label: "Contact Form Note", name: "formNote", widget: "text" }

  - name: "products_database"
    label: "Products"
    files:
      - name: "products"
        label: "Product Catalog"
        file: "data/products.json"
        format: "json"
        fields:
          - label: "Schema Metadata"
            name: "_schema"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Schema Version", name: "schemaVersion", widget: "hidden", default: "1.0.0" }
              - { label: "Data Type", name: "dataType", widget: "hidden", default: "products" }
              - { label: "Last Updated By", name: "lastUpdatedBy", widget: "hidden", default: "Decap CMS" }
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.id}} - {{fields.name.en}}"
            fields:
              - { label: "Product ID", name: "id", widget: "string" }
              - label: "Product Name"
                name: "name"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Spanish", name: "es", widget: "string", required: false }
                  - { label: "Chinese", name: "zh", widget: "string", required: false }
              - { label: "Category Key", name: "categoryKey", widget: "select", options: ["sofas", "dining", "bedroom", "storage", "living", "chairs"] }
              - label: "Category Label"
                name: "category"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Spanish", name: "es", widget: "string", required: false }
                  - { label: "Chinese", name: "zh", widget: "string", required: false }
              - { label: "Factory Type", name: "factoryType", widget: "select", options: ["upholstered", "panel", "solid wood"] }
              - { label: "Style Key", name: "styleKey", widget: "string", default: "modern" }
              - label: "Style Label"
                name: "style"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string", default: "Modern" }
                  - { label: "Spanish", name: "es", widget: "string", required: false }
                  - { label: "Chinese", name: "zh", widget: "string", required: false }
              - { label: "Product Image", name: "image", widget: "image" }
              - label: "Product Gallery"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Gallery Image", name: "image", widget: "image" }
              - label: "Description"
                name: "description"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "text" }
                  - { label: "Spanish", name: "es", widget: "text", required: false }
                  - { label: "Chinese", name: "zh", widget: "text", required: false }
              - { label: "Dimensions", name: "dimensions", widget: "string" }
              - label: "Materials"
                name: "materials"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "text" }
                  - { label: "Spanish", name: "es", widget: "text", required: false }
                  - { label: "Chinese", name: "zh", widget: "text", required: false }
              - { label: "MOQ", name: "moq", widget: "string", default: "1 x 40HQ" }
              - { label: "FOB Availability", name: "fob", widget: "boolean", default: true }
              - { label: "40HQ Loading Quantity", name: "loading40hq", widget: "string", default: "TBD" }
              - label: "Custom Options"
                name: "customOptions"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "text", default: "Fabric, finish, packaging, label program" }
                  - { label: "Spanish", name: "es", widget: "text", required: false }
                  - { label: "Chinese", name: "zh", widget: "text", required: false }
